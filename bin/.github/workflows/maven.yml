name: Java CI/CD Simulation

on:
  push:
    branches: [ "main" ] # Sesuaikan dengan nama branch Anda (main atau master)
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ---- TAHAPAN CI (Continuous Integration) ----
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # ---- TAHAPAN CD (Continuous Deployment) - TAMBAHKAN BAGIAN INI ----
    - name: Run Simulation Deployment
      run: |
        echo "=========================================================="
        echo "Mempraktekkan Simulasi Continuous Deployment & Delivery"
        echo "=========================================================="
        echo "1. Memeriksa file hasil build (Artifact)..."
        ls target/
        echo "2. Menghubungkan ke Server Produksi (Simulasi)..."
        echo "3. Mentransfer file .jar ke server..."
        echo "4. Aplikasi Java BERHASIL DI-DEPLOY dan berjalan live!"
        echo "=========================================================="